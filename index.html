<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Core - PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f4f7f6; color: #333; padding: 20px; }
        .dashboard-container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; background: linear-gradient(135deg, #2e7d32, #4caf50); color: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header h1 { font-size: 2.2rem; font-weight: 700; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .valor-principal { font-size: 3rem; font-weight: 700; color: #2e7d32; margin: 10px 0; }
        .estado-badge { display: inline-block; padding: 6px 15px; border-radius: 20px; font-weight: 500; font-size: 0.9rem; }
        .estado-humedo { background-color: #e3f2fd; color: #1e88e5; }
        .estado-optimo { background-color: #e8f5e9; color: #2e7d32; }
        .estado-seco { background-color: #ffebee; color: #e53935; }
        .grafica-section { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .footer-status { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #888; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header>
        <h1>Eco-Core Móvil</h1>
        <p>Monitoreo de Humedad en Tiempo Real</p>
    </header>

    <div class="grid-cards">
        <div class="card">
            <h3>Humedad de Suelo</h3>
            <div class="valor-principal" id="txtHumedad">--</div>
            <div id="badgeEstado" class="estado-badge estado-optimo">Sincronizando...</div>
        </div>
        <div class="card">
            <h3>Estado Agronómico</h3>
            <div id="txtInterpretacion" style="font-size: 1.1rem; font-weight: 500; margin-top: 15px; color: #555;">
                Cargando datos de la nube...
            </div>
        </div>
    </div>

    <div class="grafica-section">
        <canvas id="miGrafica" style="max-height: 350px;"></canvas>
    </div>

    <div class="footer-status" id="txtActualizacion">
        Buscando servidor...
    </div>
</div>

<script>
    const CHANNEL_ID = "3385533"; 
    const READ_API_KEY = "GZ9282RFU1J1LBSI"; 
    const urlAPI = `https://api.thingspeak.com/channels/${CHANNEL_ID}/fields/1.json?api_key=${READ_API_KEY}&results=10`;

    let graficoHumedad;

    function inicializarGrafica() {
        const ctx = document.getElementById('miGrafica').getContext('2d');
        graficoHumedad = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Humedad',
                    data: [],
                    borderColor: '#2e7d32',
                    backgroundColor: 'rgba(76, 175, 80, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { responsive: true, scales: { y: { beginAtZero: true, max: 1023 } } }
        });
    }

    async function actualizarDashboard() {
        try {
            const respuesta = await fetch(urlAPI);
            const datos = await respuesta.json();
            const feeds = datos.feeds;
            if (feeds.length === 0) return;
            
            const ultimoRegistro = feeds[feeds.length - 1];
            const valorActual = parseInt(ultimoRegistro.field1);

            if (isNaN(valorActual)) return;

            document.getElementById('txtHumedad').innerText = valorActual;

            const badge = document.getElementById('badgeEstado');
            const interpretacion = document.getElementById('txtInterpretacion');

            if (valorActual < 300) { 
                badge.innerText = "Suelo Muy Húmedo";
                badge.className = "estado-badge estado-humedo";
                interpretacion.innerText = "💧 Exceso de agua detectado en los sensores.";
            } else if (valorActual >= 300 && valorActual <= 700) {
                badge.innerText = "Humedad Óptima";
                badge.className = "estado-badge estado-optimo";
                interpretacion.innerText = "🌿 El sustrato cuenta con condiciones ideales.";
            } else {
                badge.innerText = "Suelo Seco / Alerta";
                badge.className = "estado-badge estado-seco";
                interpretacion.innerText = "⚠️ Alerta de riego. Nivel crítico de resequedad.";
            }

            const listaHoras = [];
            const listaValores = [];

            feeds.forEach(registro => {
                if(registro.field1 != null) {
                    const horaLocal = new Date(registro.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    listaHoras.push(horaLocal);
                    listaValores.push(parseInt(registro.field1));
                }
            });

            graficoHumedad.data.labels = listaHoras;
            graficoHumedad.data.datasets[0].data = listaValores;
            graficoHumedad.update();

            document.getElementById('txtActualizacion').innerText = `Actualizado: ${new Date().toLocaleTimeString()}`;
        } catch (error) {
            console.error(error);
        }
    }

    window.onload = function() {
        inicializarGrafica();
        actualizarDashboard();
        setInterval(actualizarDashboard, 20000);
    };

    // REGISTRO DEL SERVICE WORKER (Para permitir la instalación de la App)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker instalado con éxito'))
                .catch(err => console.error('Error al instalar SW', err));
        });
    }
</script>
</body>
</html>
